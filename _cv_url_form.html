<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Configurateur de CV</title>
</head>
<body>

<h1>Configurateur de CV</h1>

<form id="cv-form" novalidate>
    <fieldset>
        <legend>Couleurs</legend>
        <label for="color1">Couleur principale</label>
        <input
                aria-required="false"
                autocomplete="off"
                id="color1"
                maxlength="6"
                name="color1"
                type="text"
                value=""
        />

        <label for="color2">Couleur secondaire</label>
        <input
                aria-required="false"
                autocomplete="off"
                id="color2"
                maxlength="6"
                name="color2"
                type="text"
                value=""
        />
    </fieldset>

    <label for="job-title">Titre du poste</label>
    <input
            autocomplete="off"
            id="job-title"
            name="jobTitle"
            placeholder="Développeur Fullstack"
            type="text"
    />

    <!-- Mots-clés à mettre en surbrillance -->
    <fieldset>
        <legend>Mots-clés à mettre en surbrillance</legend>

        <fieldset>
            <legend>Backend</legend>
            <label>
                <input name="php" type="checkbox" value="1"/>
                PHP
            </label>
            <label>
                <input name="node" type="checkbox" value="1"/>
                Node.js
            </label>
            <label>
                <input name="jelix" type="checkbox" value="1"/>
                Jelix
            </label>
        </fieldset>

        <fieldset>
            <legend>Pratiques</legend>
            <label>
                <input name="clean" type="checkbox" value="1"/>
                Clean Code
            </label>
            <label>
                <input name="git" type="checkbox" value="1"/>
                Git
            </label>
            <label>
                <input name="devops" type="checkbox" value="1"/>
                Devops
            </label>
            <label>
                <input name="rgesn" type="checkbox" value="1"/>
                Eco-conception
            </label>
        </fieldset>

        <fieldset>
            <legend>Frontend</legend>
            <label>
                <input name="front" type="checkbox" value="1"/>
                Front
            </label>
            <label>
                <input name="rgaa" type="checkbox" value="1"/>
                RGAA
            </label>
            <label>
                <input name="js" type="checkbox" value="1"/>
                Javascript
            </label>
            <label>
                <input name="smarty" type="checkbox" value="1"/>
                Smarty
            </label>
        </fieldset>
    </fieldset>

    <!-- Expériences à ouvrir -->
    <fieldset>
        <legend>Expériences à ouvrir</legend>

        <fieldset>
            <legend>Expériences professionnelles</legend>
            <label><input name="xp_iraiser" type="checkbox" value="open"/> iRaiser</label>
            <label><input name="xp_iloh" type="checkbox" value="open"/> Iloh</label>
        </fieldset>

        <fieldset>
            <legend>Expériences personnelles</legend>
            <label><input name="xp_iut" type="checkbox" value="open"/> IUT</label>
            <label><input name="xp_inkside" type="checkbox" value="open"/> Inkside</label>
            <label><input name="xp_design4green" type="checkbox" value="open"/> Design4Green</label>
            <label><input name="xp_unlock" type="checkbox" value="open"/> Unlock Online</label>
        </fieldset>

    </fieldset>

    <button type="submit">Générer le CV</button>

</form>

<script>
    const color1 = document.getElementById('color1');
    const color2 = document.getElementById('color2');
    const form = document.getElementById('cv-form');

    /** Construction de l'URL et redirection */
    form.addEventListener('submit', (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const params = new URLSearchParams();

        const color1Val = color1.value.trim();
        if (color1Val) params.set('color1', color1Val);

        const color2Val = color2.value.trim();
        if (color2Val) params.set('color2', color2Val);

        const jobTitle = data.get('jobTitle')?.trim();
        if (jobTitle) params.set('jobTitle', jobTitle);

        const checkboxNames = new Set(
            [...form.querySelectorAll('input[type="checkbox"]')].map(cb => cb.name)
        );
        for (const key of checkboxNames) {
            const val = data.get(key);
            if (val !== null) params.set(key, val);
        }

        window.location.href = `./index.html?${params.toString()}`;
    });
</script>

</body>
</html>
